version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB:       proctoring_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    environment:
      DATABASE_URL:              postgresql://postgres:postgres@db:5432/proctoring_db
      JWT_SECRET_KEY:            change-this-secret-in-production
      JWT_ALGORITHM:             HS256
      JWT_EXPIRE_MINUTES:        "60"
      APP_ENV:                   production
      APP_DEBUG:                 "false"
      APP_HOST:                  "0.0.0.0"
      APP_PORT:                  "8000"
      ALLOWED_ORIGINS:           http://localhost:3000,http://frontend:3000
      FACE_SIMILARITY_THRESHOLD: "0.75"
      STORAGE_DIR:               /app/storage
      SCREENSHOTS_DIR:           /app/storage/screenshots
      REPORTS_DIR:               /app/storage/reports
      LOG_LEVEL:                 INFO
      LOG_FILE:                  /app/logs/app.log
      QT_QPA_PLATFORM:           offscreen
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./ai_engine/face_module/models:/app/ai_engine/face_module/models
      - ./ai_engine/head_pose_module/models:/app/ai_engine/head_pose_module/models
      - ./ai_engine/object_module/models:/app/ai_engine/object_module/models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL:  http://localhost:8000
      REACT_APP_WS_URL:   ws://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data: